# Deploy-only compose: pulls images from registry, no source code required on host.
# Usage on deploy host:
#   docker compose -f docker-compose.deploy.yml up -d
#
# Required .env keys: REGISTRY, POSTGRES_PASSWORD, NEWS_APP_PASSWORD, API_KEYS, CORS_ORIGINS

services:
  news-db:
    image: ${REGISTRY:-registry.oshiire.to}/news-curator/db:latest
    pull_policy: always
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/ssl/server.crt"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/ssl/server.key"
      - "-c"
      - "ssl_ca_file=/var/lib/postgresql/ssl/ca.crt"
    environment:
      POSTGRES_USER: news
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: news_curator
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      NEWS_APP_PASSWORD: ${NEWS_APP_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news -d news_curator"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpus: "1.0"
    mem_limit: 1g
    restart: "on-failure:3"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    networks:
      - backend-net

  news-migrate:
    image: ${REGISTRY:-registry.oshiire.to}/news-curator/api:latest
    pull_policy: always
    command: ["node", "dist/run-migrate.js"]
    environment:
      DATABASE_URL: postgresql://news_app:${NEWS_APP_PASSWORD}@news-db:5432/news_curator?ssl=require
      DATABASE_ADMIN_URL: postgresql://news:${POSTGRES_PASSWORD}@news-db:5432/news_curator?ssl=require
    depends_on:
      news-db:
        condition: service_healthy
    restart: "no"
    cap_drop:
      - ALL
    networks:
      - backend-net

  news-api:
    image: ${REGISTRY:-registry.oshiire.to}/news-curator/api:latest
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://news_app:${NEWS_APP_PASSWORD}@news-db:5432/news_curator?ssl=require
      DATABASE_ADMIN_URL: postgresql://news:${POSTGRES_PASSWORD}@news-db:5432/news_curator?ssl=require
      ENVIRONMENT: production
      API_KEYS: ${API_KEYS}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      news-db:
        condition: service_healthy
      news-migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8100:8100"
    cpus: "1.0"
    mem_limit: 512m
    restart: "on-failure:3"
    cap_drop:
      - ALL
    networks:
      - frontend-net
      - backend-net

  news-frontend:
    image: ${REGISTRY:-registry.oshiire.to}/news-curator/frontend:latest
    pull_policy: always
    environment:
      API_URL: http://news-api:8100
    depends_on:
      news-api:
        condition: service_healthy
    ports:
      - "3100:3000"
    cpus: "0.5"
    mem_limit: 256m
    restart: "on-failure:3"
    cap_drop:
      - ALL
    networks:
      - frontend-net

volumes:
  postgres_data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true
